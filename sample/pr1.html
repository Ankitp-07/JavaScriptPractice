<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spin Now - Aviator</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(to bottom, #730000, #330000);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .logo {
      margin-top: 20px;
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
    }

    .title {
      font-size: 2.5rem;
      margin-top: 10px;
      color: yellow;
    }

    .subtitle {
      font-size: 1.2rem;
      margin-bottom: 20px;
    }

    .wheel-container {
      position: relative;
      margin: 0 auto;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: #900;
      border: 10px solid #ff3366;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wheel {
      width: 90%;
      height: 90%;
      border-radius: 50%;
      background: conic-gradient(
        #ffcc00 0deg 60deg,
        #660000 60deg 120deg,
        #990000 120deg 180deg,
        #660000 180deg 240deg,
        #cc0033 240deg 300deg,
        #330000 300deg 360deg
      );
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 4s ease-out;
    }

    .spin-btn {
      position: absolute;
      background: yellow;
      color: black;
      border: none;
      border-radius: 50%;
      font-weight: bold;
      font-size: 1.2rem;
      width: 80px;
      height: 80px;
      cursor: pointer;
      z-index: 2;
    }

    .info {
      margin-top: 30px;
      font-size: 1.1rem;
    }

    .countdown {
      font-size: 1.8rem;
      margin-top: 10px;
    }

    .character {
      position: absolute;
      right: 10%;
      bottom: 0;
      height: 60%;
    }

    .cloud, .star, .plane {
      position: absolute;
    }

    .cloud {
      top: 15%;
      left: 5%;
    }

    .star {
      bottom: 15%;
      left: 20%;
      size-adjust:normal;
    }

    .plane {
      top: 20%;
      left: 10%;
    }
  </style>
</head>
<body>

  <div class="logo">4RABET</div>
  <div class="title">Spin Now</div>
  <div class="subtitle">Get LEGENDARY BONUS for <strong>AVIATOR</strong></div>

  <div class="wheel-container">
    <div class="wheel" id="wheel"></div>
    <button class="spin-btn" onclick="spinWheel()">SPIN</button>
  </div>

  <div class="info">
    Attempts left: <span id="attempts">2</span> / 2
    <div>EVENT ENDS:</div>
    <div class="countdown" id="timer">00:00:02</div>
  </div>

  <!-- Placeholder images -->
  <img src="https://join4ra.com/re-wheel-aviator-spin/img/plane.webp" class="plane" />
  <img src="https://img.icons8.com/emoji/48/cloud.png" class="cloud" />
  <img src="https://join4ra.com/re-wheel-aviator-spin/img/ystar.webp" class="star" />
  <img src="https://img.icons8.com/3d-fluency/200/aviator.png" class="character" />

  <script>
    let attempts = 2;

    function spinWheel() {
      if (attempts <= 0) {
        alert("No attempts left!");
        return;
      }

      const wheel = document.getElementById("wheel");
      const angle = 3600 + Math.floor(Math.random() * 360);
      wheel.style.transform = `rotate(${angle}deg)`;
      attempts--;
      document.getElementById("attempts").innerText = attempts;
    }

    // Countdown Timer
    let time = 2;
    const timer = document.getElementById("timer");
    setInterval(() => {
      if (time <= 0) return;
      time--;
      const mins = String(Math.floor(time / 60)).padStart(2, '0');
      const secs = String(time % 60).padStart(2, '0');
      timer.innerText = `00:${mins}:${secs}`;
    }, 1000);
  </script>

</body>
</html>
