<script>
   
// document.getElementById("orange").onclick=function(){

// document.getElementById("green").onclick=function(){

// }



function clickHandler(color){
    //document.body.style.backgroundColor=`${green}`

    return function(){
        document.body.style.backgroundColor=`${color}`
    }
}
document.getElementById('orange').onclick=clickHandler("orange")
document.getElementById('green').onclick=clickHandler("green")



/*
Imagine a baby (inner function) is born in a house (outer function). Even after the house is destroyed (outer returns)
, the baby still remembers the people and memories from that house that’s closure. 
JavaScript will NOT garbage collect variables that are still referenced even if the function that created them is finished

*/
